<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5; min-height: 100vh; padding: 40px 20px;
        }
        .container { max-width: 680px; margin: 0 auto; }
        h1 { text-align: center; color: #1a1a2e; font-size: 2rem; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 28px; font-size: 0.95rem; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 20px; }
        .section-title { font-size: 1rem; font-weight: 600; color: #333; margin-bottom: 14px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .welcome { font-size: 0.9rem; color: #888; }
        .welcome span { color: #4361ee; font-weight: 500; }
        .btn-logout { background: #fde8e8; color: #c0392b; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
        input, select, textarea {
            width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 0.95rem; outline: none;
            transition: border-color 0.2s; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: #4361ee; }
        textarea { resize: vertical; min-height: 65px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-primary {
            background: #4361ee; color: white; border: none;
            border-radius: 8px; padding: 12px; font-size: 1rem;
            font-weight: 500; width: 100%; cursor: pointer; margin-top: 4px;
        }
        .btn-primary:hover { background: #3451d1; }
        .stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat { flex: 1; background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-num { font-size: 1.8rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 2px; }
        .num-total { color: #4361ee; }
        .num-progress { color: #e65100; }
        .num-pending { color: #c0392b; }
        .num-done { color: #2e7d32; }
        .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 16px; border-radius: 99px; border: 1.5px solid #e0e0e0;
            background: white; cursor: pointer; font-size: 0.85rem;
            font-weight: 500; color: #666; transition: all 0.2s;
        }
        .filter-btn.active { background: #4361ee; color: white; border-color: #4361ee; }
        .todo-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 16px; border-radius: 10px; background: #f8f9ff;
            margin-bottom: 10px; border: 1.5px solid #eee;
        }
        .todo-item.completed { opacity: 0.55; background: #f5f5f5; }
        .todo-item.completed .todo-title { text-decoration: line-through; color: #999; }
        .todo-item.overdue { border-color: #ffc0c0; background: #fff8f8; }
        .todo-checkbox { width: 20px; height: 20px; min-width: 20px; cursor: pointer; margin-top: 2px; }
        .todo-body { flex: 1; }
        .todo-title { font-weight: 500; color: #1a1a2e; margin-bottom: 4px; }
        .todo-desc { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
        .todo-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
        .badge-HIGH { background: #fde8e8; color: #c0392b; }
        .badge-MEDIUM { background: #fef3cd; color: #856404; }
        .badge-LOW { background: #d4edda; color: #155724; }
        .badge-PENDING { background: #fde8e8; color: #c0392b; }
        .badge-IN_PROGRESS { background: #fff3e0; color: #e65100; }
        .badge-COMPLETED { background: #e8f5e9; color: #2e7d32; }
        .due-date { font-size: 11px; color: #999; }
        .due-overdue { font-size: 11px; color: #c0392b; font-weight: 600; }
        .todo-actions { display: flex; gap: 6px; flex-direction: column; }
        .btn-delete { background: #fde8e8; color: #c0392b; padding: 6px 10px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-complete { background: #d4edda; color: #155724; padding: 6px 10px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; }
        .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 0.95rem; }
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1a1a2e; color: white; padding: 12px 20px;
            border-radius: 10px; font-size: 0.9rem; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">

    <!-- Header with welcome + logout -->
    <div class="header-row">
        <h1>📝 My To-Do App</h1>
        <div>
            <span class="welcome">Hello, <span id="usernameDisplay"></span></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>
    <p class="subtitle">Stay organized, get things done</p>

    <!-- Stats -->
    <div class="stats">
        <div class="stat"><div class="stat-num num-total" id="totalCount">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num num-progress" id="progressCount">0</div><div class="stat-label">In Progress</div></div>
        <div class="stat"><div class="stat-num num-pending" id="pendingCount">0</div><div class="stat-label">Overdue</div></div>
        <div class="stat"><div class="stat-num num-done" id="doneCount">0</div><div class="stat-label">Done</div></div>
    </div>

    <!-- Add Task -->
    <div class="card">
        <div class="section-title">Add New Task</div>
        <div class="form-row">
            <input type="text" id="titleInput" placeholder="Task title *" />
        </div>
        <div class="form-row">
            <textarea id="descInput" placeholder="Description (optional)"></textarea>
        </div>
        <div class="form-row">
            <select id="priorityInput">
                <option value="LOW">🟢 Low Priority</option>
                <option value="MEDIUM" selected>🟡 Medium Priority</option>
                <option value="HIGH">🔴 High Priority</option>
            </select>
            <input type="datetime-local" id="dueDateInput" />
        </div>
        <button class="btn-primary" onclick="addTodo()">+ Add Task</button>
    </div>

    <!-- Task List -->
    <div class="card">
        <div class="section-title">My Tasks</div>
        <div class="filters">
            <button class="filter-btn active" onclick="filterTodos('ALL', this)">All</button>
            <button class="filter-btn" onclick="filterTodos('IN_PROGRESS', this)">In Progress</button>
            <button class="filter-btn" onclick="filterTodos('PENDING', this)">Overdue</button>
            <button class="filter-btn" onclick="filterTodos('COMPLETED', this)">Completed</button>
        </div>
        <div id="todoList"><div class="empty">No tasks yet. Add one above!</div></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/api/todos';
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId');
    const username = localStorage.getItem('username');
    let allTodos = [];
    let currentFilter = 'ALL';

    // Redirect to login if not logged in
    if (!token) window.location.href = '/login.html';

    // Show username
    document.getElementById('usernameDisplay').textContent = username || 'User';

    // Auth headers for all API calls
    function authHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        };
    }

    // Logout
    function logout() {
        localStorage.clear();
        window.location.href = '/login.html';
    }

    // Smart status based on due date
    function getSmartStatus(todo) {
        if (todo.status === 'COMPLETED') return 'COMPLETED';
        if (!todo.dueDate) return 'IN_PROGRESS';
        const due = new Date(todo.dueDate + 'T23:59:59');
        const now = new Date();
        return due < now ? 'PENDING' : 'IN_PROGRESS';
    }

    // Load all todos
    async function loadTodos() {
        try {
            const res = await fetch(API, { headers: authHeaders() });
            allTodos = await res.json();
            renderTodos();
            updateStats();
        } catch (e) {
            showToast('❌ Could not connect to server');
        }
    }

    // Add new todo
    async function addTodo() {
        const title = document.getElementById('titleInput').value.trim();
        if (!title) { showToast('⚠️ Please enter a task title!'); return; }

        const dueDateRaw = document.getElementById('dueDateInput').value;
        const dueDate = dueDateRaw ? dueDateRaw.split('T')[0] : null;

        let status = 'IN_PROGRESS';
        if (dueDateRaw) {
            status = new Date(dueDateRaw) >= new Date() ? 'IN_PROGRESS' : 'PENDING';
        }

        const todo = {
            title,
            description: document.getElementById('descInput').value.trim(),
            priority: document.getElementById('priorityInput').value,
            status,
            dueDate,

        };

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify(todo)
            });
            if (res.ok) {
                document.getElementById('titleInput').value = '';
                document.getElementById('descInput').value = '';
                document.getElementById('dueDateInput').value = '';
                showToast('✅ Task added!');
                loadTodos();
            } else {
                showToast('❌ Failed to add task');
            }
        } catch (e) {
            showToast('❌ Server error');
        }
    }

    // Complete or uncomplete todo
    async function completeTodo(id) {
        const todo = allTodos.find(t => t.id === id);
        const newStatus = todo.status === 'COMPLETED' ? 'IN_PROGRESS' : 'COMPLETED';
        try {
            await fetch(API + '/' + id, {
                method: 'PUT',
                headers: authHeaders(),
                body: JSON.stringify({ ...todo, status: newStatus })
            });
            showToast(newStatus === 'COMPLETED' ? '✅ Task completed!' : '🔄 Marked in progress');
            loadTodos();
        } catch (e) {
            showToast('❌ Could not update task');
        }
    }

    // Delete todo
    async function deleteTodo(id) {
        if (!confirm('Delete this task?')) return;
        try {
            await fetch(API + '/' + id, {
                method: 'DELETE',
                headers: authHeaders()
            });
            showToast('🗑️ Task deleted');
            loadTodos();
        } catch (e) {
            showToast('❌ Could not delete task');
        }
    }

    // Filter todos
    function filterTodos(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTodos();
    }

    // Render todos
    function renderTodos() {
        const list = document.getElementById('todoList');
        let filtered = allTodos.map(t => ({ ...t, smartStatus: getSmartStatus(t) }));
        if (currentFilter !== 'ALL') {
            filtered = filtered.filter(t => t.smartStatus === currentFilter);
        }
        filtered.sort((a, b) => {
            const p = { HIGH: 0, MEDIUM: 1, LOW: 2 };
            return (p[a.priority] - p[b.priority]) || (new Date(a.dueDate) - new Date(b.dueDate));
        });

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty">No tasks here!</div>';
            return;
        }

        list.innerHTML = filtered.map(todo => {
            const isOverdue = todo.smartStatus === 'PENDING' && todo.status !== 'COMPLETED';
            const isDone = todo.status === 'COMPLETED';
            return '<div class="todo-item ' + (isDone ? 'completed' : '') + ' ' + (isOverdue ? 'overdue' : '') + '">' +
                '<input type="checkbox" class="todo-checkbox" ' + (isDone ? 'checked' : '') + ' onchange="completeTodo(' + todo.id + ')">' +
                '<div class="todo-body">' +
                '<div class="todo-title">' + todo.title + '</div>' +
                (todo.description ? '<div class="todo-desc">' + todo.description + '</div>' : '') +
                '<div class="todo-meta">' +
                '<span class="badge badge-' + todo.priority + '">' + todo.priority + '</span>' +
                '<span class="badge badge-' + todo.smartStatus + '">' + todo.smartStatus.replace('_', ' ') + '</span>' +
                (todo.dueDate ? '<span class="' + (isOverdue ? 'due-overdue' : 'due-date') + '">' + (isOverdue ? '⚠️ Overdue: ' : '📅 ') + todo.dueDate + '</span>' : '') +
                '</div>' +
                '</div>' +
                '<div class="todo-actions">' +
                '<button class="btn-complete" onclick="completeTodo(' + todo.id + ')">' + (isDone ? '↩️' : '✓') + '</button>' +
                '<button class="btn-delete" onclick="deleteTodo(' + todo.id + ')">🗑️</button>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    // Update stats
    function updateStats() {
        const smart = allTodos.map(t => getSmartStatus(t));
        document.getElementById('totalCount').textContent = allTodos.length;
        document.getElementById('progressCount').textContent = smart.filter(s => s === 'IN_PROGRESS').length;
        document.getElementById('pendingCount').textContent = smart.filter(s => s === 'PENDING').length;
        document.getElementById('doneCount').textContent = smart.filter(s => s === 'COMPLETED').length;
    }

    // Toast notification
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    loadTodos();
</script>
</body>
</html>
